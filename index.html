<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logxus — Agentic Supply Chain Platform</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0D1B2A; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0D1B2A; }
      ::-webkit-scrollbar-thumb { background: #243447; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #0E7C7B; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes countUp { from { opacity: 0; } to { opacity: 1; } }
      .fade-in { animation: fadeIn 0.25s ease forwards; }
      input, select, textarea, button { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
